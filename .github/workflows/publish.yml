name: Publish to npm

on:
  push:
    tags:
      - 'v*' #只在打 tag 时发布（推荐）


jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org/

      - name: 安装依赖
        run: npm install

      - name: 构建项目（可选）
        run: npm run build
        continue-on-error: true

      - name: 发布到 npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
